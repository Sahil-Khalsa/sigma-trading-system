name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sigma
          POSTGRES_PASSWORD: sigma_pass
          POSTGRES_DB: sigma_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Apply DB schema
        run: psql postgresql://sigma:sigma_pass@localhost:5432/sigma_db -f memory/schema.sql

      - name: Run tests
        env:
          ALPACA_API_KEY:   ${{ secrets.ALPACA_API_KEY   || 'test_key' }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY || 'test_secret' }}
          POLYGON_API_KEY:  ${{ secrets.POLYGON_API_KEY  || 'test_key' }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY   || 'test_key' }}
          DATABASE_URL:     postgresql://sigma:sigma_pass@localhost:5432/sigma_db
        run: python -m pytest tests/test_e2e.py -v --tb=short

  build-dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: dashboard
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, build-dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sigma-backend:ci .

      - name: Build dashboard image
        run: docker build -t sigma-dashboard:ci ./dashboard
